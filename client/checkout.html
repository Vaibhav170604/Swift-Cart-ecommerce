<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Complete your SwiftCart purchase securely.">
  <title>SwiftCart | Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="announcement-bar">
    <p>Free standard shipping on orders over $50. Shop the new season now!</p>
  </div>

  <header class="main-header">
    <div class="container navbar">
      <a href="index.html" class="logo">Swift<span>Cart</span></a>
      <nav class="nav-menu" id="nav-menu">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="index.html#shop">Shop</a></li>
          <li><a href="orders.html">My Orders</a></li>
          <li><a href="profile.html">Profile</a></li>
        </ul>
      </nav>
      <div class="nav-actions">
        <a href="login.html" class="nav-icon" id="auth-link" title="Account">
          <i class="fa-regular fa-user"></i>
        </a>
        <button class="nav-icon theme-toggle" id="theme-toggle" title="Toggle Theme" aria-label="Toggle Theme">
          <i class="fa-regular fa-moon"></i>
        </button>
        <a href="cart.html" class="nav-icon cart-icon-wrapper" title="Cart">
          <i class="fa-solid fa-bag-shopping"></i>
          <span class="cart-count" id="cart-badge">0</span>
        </a>
        <a href="wishlist.html" class="nav-icon wishlist-icon-wrapper" title="Wishlist">
          <i class="fa-regular fa-heart"></i>
          <span class="wishlist-count" id="wishlist-badge">0</span>
        </a>
        <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle Menu">
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="checkout-section">
    <div class="container" id="checkout-root">
      <div class="checkout-loading">
        <i class="fa-solid fa-circle-notch fa-spin"></i>
        <p>Loading checkout...</p>
      </div>
    </div>
  </main>

  <footer class="main-footer checkout-footer">
    <div class="container footer-bottom-flex">
      <p>&copy; 2026 SwiftCart. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/toastService.js"></script>
  <script src="js/uiHelpers.js"></script>
  <script src="js/cartService.js"></script>
  <script src="js/orderService.js"></script>
  <script src="js/orderModal.js"></script>
  <script src="js/authGuard.js"></script>
  <script src="js/authSession.js"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="js/paymentService.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
